<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Crypto Price Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>💰 Crypto Tracker</h1>
            <p>Giá cryptocurrency theo thời gian thực</p>
        </div>

        <div id="coin-cards" class="coin-cards">
            <!-- Coin price cards will be dynamically inserted here -->
        </div>

        <div class="update-time" id="update-time">
            Chưa có dữ liệu
        </div>

        <div class="add-coin-section">
            <div class="add-coin-input-row">
                <input type="text" id="add-coin-input" placeholder="Nhập symbol (vd: BTC, SOL...)" autocomplete="off">
                <button id="add-coin-btn" title="Thêm coin">＋</button>
            </div>
            <div id="add-coin-error" class="add-coin-error"></div>
        </div>

        <div class="footer">
            <p>Dữ liệu được cập nhật theo thời gian thực</p>
        </div>
    </div>

    <script src="coin-logos.js"></script>
    <script src="popup.js"></script>
</body>

</html>
